name: Sync API types from backend

on:
  repository_dispatch:
    types: [backend-deployed]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate API types from backend Swagger
        run: npm run generate-api-types

      - name: Open PR if types changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Sync API types from backend OpenAPI spec'
          title: 'Sync API types from backend OpenAPI spec'
          body: |
            백엔드(`https://logisquare.p-e.kr/v3/api-docs`)의 API 스펙이 변경되어 자동으로 생성된 PR입니다.

            `src/api/schema.d.ts`의 diff를 확인하고, 새로 추가되거나 변경된 API를 실제 화면에 연동할지 검토해 주세요.
          branch: sync-api-types
          delete-branch: true
          add-paths: src/api/schema.d.ts
